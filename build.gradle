plugins {
    id 'java'
}

group 'ml.noderyos'
version '1.0'

repositories {
    mavenCentral()
}

dependencies {
    implementation "net.dv8tion:JDA:5.0.0-alpha.3"
    implementation "org.twitter4j:twitter4j-core:4.0.7"
    implementation 'com.google.code.gson:gson:2.8.9'
    implementation 'org.jsoup:jsoup:1.14.3'
}